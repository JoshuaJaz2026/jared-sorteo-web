<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Boleto Digital - Sorteo Jared</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background-color: #f3f4f6; }
        .ticket-bg {
            background: linear-gradient(135deg, #632876 0%, #4a1d58 100%);
        }
        .sawtooth {
            background-image: radial-gradient(#f3f4f6 4px, transparent 5px);
            background-size: 15px 15px;
            background-position: -5px -5px;
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">

    <div class="max-w-md w-full bg-white rounded-xl shadow-2xl overflow-hidden relative">
        
        <div class="ticket-bg p-6 text-center text-white relative">
            <h2 class="text-sm font-bold tracking-widest uppercase mb-1 text-red-400">Fiestas Patrias 2026</h2>
            <h1 class="text-3xl font-extrabold mb-2">Electrodomésticos Jared</h1>
            <p class="text-xs opacity-80">¡Gracias por participar en nuestro gran sorteo!</p>
            
            <div class="sawtooth absolute bottom-0 left-0 right-0 h-4 w-full translate-y-1/2"></div>
        </div>

        <div class="p-8 pt-10 text-center relative border-b-2 border-dashed border-gray-300">
            <div class="inline-block bg-green-100 text-green-700 px-4 py-1 rounded-full text-xs font-bold uppercase tracking-wide mb-6">
                ✅ Pago Validado
            </div>

            <div class="mb-4">
                <p class="text-gray-500 text-xs font-semibold uppercase">Participante</p>
                <p class="text-xl font-bold text-gray-800">{{ p.nombre_completo }}</p>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-gray-500 text-xs font-semibold uppercase">DNI</p>
                    <p class="text-lg font-bold text-gray-800">{{ p.dni }}</p>
                </div>
                <div class="bg-gray-50 p-3 rounded-lg">
                    <p class="text-gray-500 text-xs font-semibold uppercase">Teléfono</p>
                    <p class="text-lg font-bold text-gray-800">{{ p.celular }}</p>
                </div>
            </div>
        </div>

        <div class="p-6 bg-gray-50 text-center">
            <p class="text-xs text-gray-400 mb-2">Código de Participación</p>
            <p class="font-mono text-4xl tracking-widest text-gray-800 mb-2">||| |||| | || |||</p>
            <p class="text-xs font-bold text-gray-500">TICKET-{{ p.id }}00{{ p.dni|slice:":3" }}</p>
        </div>

    </div>

</body>
</html>
